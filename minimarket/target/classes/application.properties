spring.application.name=minimarket
spring.datasource.url=jdbc:h2:mem:minimarketdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
server.port=8080
logging.level.com.minimarket.security=INFO
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-exception=false

#======================================#
# Configuración de JWT
jwt.secret=MiniMarketPlusSecretKey2026SuperSeguraYFuerte
#Expiración del token en milisegundos (1 hora)
jwt.expiration=3600000
#======================================#